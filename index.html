<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية أمن المنشآت | محافظة الرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #070B19; --bg-card: #111827; --primary: #3B82F6; --primary-hover: #2563EB;
            --accent-gold: #F59E0B; --success: #10B981; --danger: #EF4444; --text-main: #F8FAFC;
            --text-muted: #94A3B8; --border-color: #1F2937;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; user-select: none; }
        .container { max-width: 1000px; margin: auto; }
        .header-logo { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; }
        .header-logo h1 { color: var(--accent-gold); margin: 0; font-size: 2.5em; font-weight: 900; text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .header-logo h2 { color: var(--primary); margin: 5px 0 0; font-size: 1.5em; }
        
        .card { background: var(--bg-card); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 12px; background: #0F172A; border: 1px solid var(--border-color); color: white; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 1em; box-sizing: border-box;}
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; color: white; font-family: 'Cairo'; margin-top: 10px; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn:disabled { background: #374151; color: #9CA3AF; cursor: not-allowed; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }

        .study-content { background: #0F172A; padding: 0; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 20px;}
        .study-content iframe { width: 100%; height: 600px; border: none; }
        .timer-box { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 15px; border-radius: 8px; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }

        .question-block { background: #151F32; padding: 25px; border-radius: 12px; border-right: 5px solid var(--primary); margin-bottom: 25px; }
        .option-label { display: block; padding: 15px; margin: 10px 0; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; display: flex; align-items: center; }
        .option-label:hover { background: #1F2937; border-color: var(--primary); }
        input[type="radio"] { transform: scale(1.3); margin-left: 15px; accent-color: var(--primary); }

        .alert-box { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent-gold); padding: 15px; border-radius: 8px; color: var(--accent-gold); margin-bottom: 20px; text-align: center; font-weight: bold; }
        #login-section, #study-section, #quiz-section, #result-section { display: none; }
        #login-section { display: block; }
    </style>
</head>
<body>

    <div class="header-logo">
        <h1>أمن المنشآت</h1>
        <h2>محافظة الرس - كلية التدريب الذكية</h2>
    </div>

    <!-- واجهة الدخول -->
    <div id="login-section" class="container card">
        <div class="alert-box">
            ⚠️ تنبيه أمني مشدد: هذا التقديم يرتبط مباشرة بالقيادة العليا. أي تلاعب بالبيانات سيتم تحويله فوراً للشرطة العسكرية.
        </div>
        
        <div class="grid">
            <div class="input-group">
                <label>الاسم الكامل (كما في القطاع):</label>
                <input type="text" id="t-name" placeholder="أدخل اسمك الكامل...">
            </div>
            <div class="input-group">
                <label>معرف الديسكورد (Discord ID):</label>
                <input type="text" id="t-discord" placeholder="أدخل الـ ID الخاص بك (أرقام فقط)...">
            </div>
        </div>
        
        <div class="input-group">
            <label>اختر رتبتك العسكرية الحالية:</label>
            <select id="t-rank" onchange="checkRankCourse()">
                <option value="">-- اختر الرتبة --</option>
                <option value="جندي">جندي</option>
                <option value="جندي أول">جندي أول</option>
                <option value="عريف">عريف</option>
                <option value="وكيل رقيب">وكيل رقيب</option>
                <option value="رقيب">رقيب</option>
                <option value="رقيب أول">رقيب أول</option>
                <option value="رئيس رقباء">رئيس رقباء</option>
                <option value="ملازم">ملازم</option>
                <option value="ملازم أول">ملازم أول</option>
                <option value="نقيب">نقيب</option>
                <option value="رائد">رائد</option>
                <option value="مقدم">مقدم</option>
                <option value="عقيد">عقيد</option>
                <option value="عميد">عميد</option>
                <option value="لواء">لواء</option>
                <option value="فريق">فريق</option>
                <option value="فريق أول">فريق أول</option>
            </select>
        </div>

        <div id="course-assigned-msg" style="text-align: center; margin: 20px 0; font-size: 1.2em; font-weight: bold; color: var(--primary);"></div>
        <button id="btn-enter" class="btn btn-primary" onclick="enterAcademy()" disabled>تأكيد الدخول</button>
    </div>

    <!-- واجهة الدراسة وعرض الشرائح -->
    <div id="study-section" class="container card">
        <h2 style="text-align: center; color: var(--primary);" id="study-title"></h2>
        <div class="timer-box" id="study-timer">
            يجب قراءة الدليل بالكامل بتركيز وتأني. سيتم تفعيل زر البدء بعد: <span id="time-left">20:00</span>
        </div>
        <!-- سيتم دمج شرائح جوجل هنا -->
        <div class="study-content" id="study-content"></div>
        <button id="btn-start-quiz" class="btn btn-success" onclick="startQuiz()" disabled style="margin-top: 20px;">أنا جاهز، ابدأ الاختبار الفعلي</button>
    </div>

    <!-- واجهة الاختبار -->
    <div id="quiz-section" class="container card">
        <h2 style="color: var(--accent-gold); text-align: center;">الاختبار الميداني المؤتمت</h2>
        <div id="questions-container"></div>
        <button class="btn btn-primary" onclick="submitQuiz()">إنهاء وتسليم الإجابات</button>
    </div>

    <!-- واجهة النتيجة -->
    <div id="result-section" class="container card" style="text-align: center;">
        <h2 style="color: var(--primary);">النتيجة النهائية للاختبار</h2>
        <div style="font-size: 4em; font-weight: 900; margin: 20px 0;" id="result-score"></div>
        <h2 id="result-status"></h2>
        <p id="result-details" style="color: var(--text-muted); font-size: 1.2em;"></p>
        <button class="btn btn-primary" onclick="location.reload()">تسجيل خروج وإنهاء الجلسة</button>
    </div>

    <script>
        // خريطة الرتب والدورات
        const rankMapping = {
            "جندي": "دورة العمليات",
            "جندي أول": "دورة الشخصية العسكرية",
            "عريف": "دورة الجناح الجوي",

            "رائد": "دورة السوات", "مقدم": "دورة السوات", "عقيد": "دورة السوات", "عميد": "دورة السوات",

                    { q: "وفقاً لقاعدة الغياب، متى يستلم نائب العمليات مهام العمليات بشكل كامل؟", options: ["في حال غياب المسؤول لأكثر من 15 دقيقة", "عند نهاية النوبة فقط", "فور خروج المسؤول للميدان مباشرة"], a: "في حال غياب المسؤول لأكثر من 15 دقيقة" },
                    { q: "ما هو سلم أولويات التوجيه عند حدوث عجز ميداني مفاجئ؟", options: ["الأمن المباشر ثم الوحدات الحرة", "الوحدات الحرة، ثم الأمن المباشر، ثم الجناح الجوي (شاهين)", "الجناح الجوي أولاً لتغطية العجز سرياً"], a: "الوحدات الحرة، ثم الأمن المباشر، ثم الجناح الجوي (شاهين)" },

                    { q: "ما هو الكود المعتمد الذي يستخدمه مسؤول العمليات لتغطية غيابه المؤقت بواسطة نائبه؟", options: ["Code 4", "Code 7", "Code 8"], a: "Code 7" },

                    { q: "ما هي الصلاحية القصوى للأفراد في السجن الجنائي للمواطن؟", options: ["15 شهر/دقيقة (تصل لـ20 في الإهانة العسكرية)", "5 شهور فقط", "ليس لديهم صلاحية"], a: "15 شهر/دقيقة (تصل لـ20 في الإهانة العسكرية)" },

                    { q: "إذا استخدم المجرم سلاحاً غير مرخص، ماذا يتم سحبه؟", options: ["جميع اسلحته حتى المرخصة", "سحب السلاح الذي استخدم في الجريمة فقط", "الرخص فقط"], a: "سحب السلاح الذي استخدم في الجريمة فقط" },
                    { q: "ما هي عبارة التفتيش المهنية المعتمدة في بوابات الميناء؟", options: ["السلام عليكم يا مواطن، فضلا أعطني ظهرك للتفتيش", "ارفع يدك فورا", "توقف مكانك أو أطلق النار"], a: "السلام عليكم يا مواطن، فضلا أعطني ظهرك للتفتيش" },

                    { q: "ما المعدل الزمني لتسيير الدوريات الراجلة لتأمين القطاعات؟", options: ["دورية كل 10 دقائق، وإدارة المشهد عبر F11", "دورية كل 30 دقيقة", "دورية كل ساعة"], a: "دورية كل 10 دقائق، وإدارة المشهد عبر F11" },
                    { q: "ما هي المدة النظامية لعقوبة السجن التأديبية للقطاع؟", options: ["أقل مدة شهرين وأقصى 10", "أقل مدة 5 شهور وأقصى مدة 20 شهراً، ويُمنع التلاعب بالمدة", "من سنة إلى 3 سنوات"], a: "أقل مدة 5 شهور وأقصى مدة 20 شهراً، ويُمنع التلاعب بالمدة" },
                    { q: "ما التغطية الزمنية المستمرة لتقرير ضابط المنطقة ليُحتسب كساعة؟", options: ["30 دقيقة", "45 دقيقة", "60 دقيقة من العمل المستمر دون انقطاع"], a: "60 دقيقة من العمل المستمر دون انقطاع" },
                    { q: "ما السياسة المعتمدة لتحركات (الدوريات الحرة) داخل الميناء؟", options: ["التمركز الثابت والترصد", "الالتزام بالتنقل المستمر ويُمنع الترصد أو التمركز الثابت الطويل", "التحرك عند البلاغ فقط"], a: "الالتزام بالتنقل المستمر ويُمنع الترصد أو التمركز الثابت الطويل" }
                ]
            },
            "دورة السوات": {
                embedUrl: "https://docs.google.com/presentation/d/1dW07y5vwfV6WAhohx48C8WXdfA6cihFSbte_NwnJw80/embed?rm=minimal",
                questions: [
                    { q: "ما هو الحد الأدنى والحد الأقصى لعدد أفراد فرقة السوات المسموح به للخروج كقوة مهام؟", options: ["فردان أدنى و 8 أقصى", "3 أشخاص كحد أدنى و 6 أشخاص كحد أقصى", "5 أدنى و 10 أقصى"], a: "3 أشخاص كحد أدنى و 6 أشخاص كحد أقصى" },
                    { q: "من هو الشخص الوحيد المصرح له بمخاطبة المواطنين من داخل مركبة السوات؟", options: ["مسؤول البلاغات", "مسؤول النداءات", "قائد الفرقة (السائق) حصرياً له الحق"], a: "قائد الفرقة (السائق) حصرياً له الحق" },
                    { q: "ما الموقف القانوني لفرقة السوات بخصوص التدرج في السلاح الناري؟", options: ["ملزمون بالتدرج دائماً", "غير ملزمين بقانون التدرج، ويحق لهم إطلاق النار فوراً على المسلح (أبيض أو ناري)", "التدرج مطلوب داخل המيناء فقط"], a: "غير ملزمين بقانون التدرج، ويحق لهم إطلاق النار فوراً على المسلح (أبيض أو ناري)" },
                    { q: "ما هي المركبات الرسمية المعتمدة للسوات في الميدان؟", options: ["دوريات الأمن العام", "فان السوات، المروحية، والقارب (ويجب شراؤها)", "أي مركبة متوفرة"], a: "فان السوات، المروحية، والقارب (ويجب شراؤها)" },
                    { q: "متى يحق لفرقة السوات استخدام سلاح القناصة (السنايبر)؟", options: ["في جميع المداهمات", "يُمنع استخدامه نهائياً", "يُسمح به في حالة واحدة فقط: إذا كان الطرف الآخر يستخدم سلاح سنايبر ضد الفرقة"], a: "يُسمح به في حالة واحدة فقط: إذا كان الطرف الآخر يستخدم سلاح سنايبر ضد الفرقة" },
                    { q: "ما الإجراء الصحيح مع المجرمين بعد السيطرة الكاملة عليهم بواسطة السوات؟", options: ["التحقيق معهم", "تسليمهم لأي عسكري آخر (أمن عام، أفواج، أمن منشآت) لاستكمال السجن", "نقلهم لمقر سري"], a: "تسليمهم لأي عسكري آخر (أمن عام، أفواج، أمن منشآت) لاستكمال السجن" },
                    { q: "أي من الخيارات يعد مخالفة لملابس السوات الرسمي؟", options: ["نزع الخوذة", "ارتداء سترة إضافية فوق الزي الرسمي", "جميع ما سبق صحيح ويُعد مخالفة عسكرية"], a: "جميع ما سبق صحيح ويُعد مخالفة عسكرية" },
                    { q: "متى يحق للسوات سجن المواطنين بأنفسهم؟", options: ["يحق لهم سجن المواطنين استثنائياً فقط في حال عدم توفر وحدات شاغرة من الأمن العام أو الأفواج", "دائماً", "يمنع تماماً"], a: "يحق لهم سجن المواطنين استثنائياً فقط في حال عدم توفر وحدات شاغرة من الأمن العام أو الأفواج" },
                    { q: "ما هي الموجة اللاسلكية الرسمية للسوات أثناء العمليات؟", options: ["موجة الأمن العام (5)", "موجة أمن المنشآت الرسمية (موجة 10)", "موجة مفتوحة"], a: "موجة أمن المنشآت الرسمية (موجة 10)" },
                    { q: "من يتولى قيادة فرقة السوات ميدانياً وإصدار أوامر المداهمة؟", options: ["أقدم فرد", "أعلى رتبة عسكرية موجودة ضمن الفريق الميداني", "مسؤول النداءات"], a: "أعلى رتبة عسكرية موجودة ضمن الفريق الميداني" }
                ]
            }
        };

        let currentTrainee = {};
        let currentCourseData = null;
        let selectedQuestions = [];
        const passingScore = 75;

        function checkRankCourse() {
            const rank = document.getElementById('t-rank').value;
            const msgDiv = document.getElementById('course-assigned-msg');
            const btn = document.getElementById('btn-enter');
            
            if(!rank) { msgDiv.innerText = ""; btn.disabled = true; return; }
            const assignedCourse = rankMapping[rank];
            
            if(assignedCourse === "لا يوجد دورات مطلوبة حالياً" || !coursesData[assignedCourse]) {
                msgDiv.innerHTML = `<span style="color: var(--danger);">رتبتك الحالية (${rank}) إما لا تتطلب دورة للأفراد حالياً، أو الدورة سرية.</span>`;
                btn.disabled = true;
            } else {
                msgDiv.innerHTML = `الدورة الإلزامية المخصصة لترقيتك هي: <br><span style="font-size:1.5em; color:var(--accent-gold);">${assignedCourse}</span>`;
                btn.disabled = false;
            }
        }

        function enterAcademy() {
            const name = document.getElementById('t-name').value.trim();
            const discord = document.getElementById('t-discord').value.trim();
            const rank = document.getElementById('t-rank').value;
            
            if(!name || !discord || isNaN(discord)) {
                alert("تنبيه أمني: يرجى إدخال اسمك الكامل ومعرف ديسكورد صحيح (يتكون من أرقام فقط).");
                return;
            }

            currentTrainee = { name, discord, rank, courseName: rankMapping[rank] };
            currentCourseData = coursesData[currentTrainee.courseName];

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('study-section').style.display = 'block';
            document.getElementById('study-title').innerText = currentTrainee.courseName;
            
            // دمج شرائح جوجل بداخل الموقع!
            document.getElementById('study-content').innerHTML = `<iframe src="${currentCourseData.embedUrl}" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>`;
            
            startStudyTimer();
        }

        function startStudyTimer() {
            // للتجربة: العداد 5 ثواني. (لإلزام الطلاب، غيره إلى 1200 ليعادل 20 دقيقة)
            let time = 1200; 
            const display = document.getElementById('time-left');
            const btn = document.getElementById('btn-start-quiz');
            
            window.onbeforeunload = function() { return "تنبيه أمني!"; };

            const studyInterval = setInterval(() => {
                let m = Math.floor(time / 60);
                let s = time % 60;
                display.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                
                if (time <= 0) {
                    clearInterval(studyInterval);
                    display.innerText = "00:00 - تم إتمام القراءة الفنية، يمكنك الاختبار الآن!";
                    btn.disabled = false;
                }
                time--;
            }, 1000);
        }

        function startQuiz() {
            window.onbeforeunload = null; 
            document.getElementById('study-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';

            let allQ = [...currentCourseData.questions];
            selectedQuestions = allQ.sort(() => 0.5 - Math.random()).slice(0, 10);

            const container = document.getElementById('questions-container');
            container.innerHTML = selectedQuestions.map((q, i) => {
                let shuffledOptions = [...q.options].sort(() => 0.5 - Math.random());
                return `
                <div class="question-block" id="qblock-${i}">
                    <h3 style="color:#fff;">السؤال ${i+1}: ${q.q}</h3>
                    ${shuffledOptions.map((opt, j) => `
                        <label class="option-label">
                            <input type="radio" name="q${i}" value="${opt}">
                            <span style="font-size:1.1em; font-weight:bold; color:var(--text-muted);">${opt}</span>
                        </label>
                    `).join('')}
                </div>`;
            }).join('');
            window.scrollTo(0, 0);
        }

        function submitQuiz() {
            let score = 0;
            let unanswered = 0;

            selectedQuestions.forEach((q, i) => {
                const checked = document.querySelector(`input[name="q${i}"]:checked`);
                if(!checked) {
                    unanswered++;
                    document.getElementById(`qblock-${i}`).style.borderColor = 'var(--danger)';
                } else {
                    document.getElementById(`qblock-${i}`).style.borderColor = 'var(--primary)';
                    if(checked.value === q.a) score++;
                }
            });

            if(unanswered > 0) {
                alert(`خطأ تكتيكي: يوجد لديك ${unanswered} أسئلة لم تقم بحلها!`);
                return;
            }

            const percentage = Math.round((score / selectedQuestions.length) * 100);
            const isPassed = percentage >= passingScore;

            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';

            const scoreDiv = document.getElementById('result-score');
            const statusDiv = document.getElementById('result-status');
            
            scoreDiv.innerText = percentage + '%';
            scoreDiv.style.color = isPassed ? 'var(--success)' : 'var(--danger)';
            statusDiv.innerText = isPassed ? 'اجتياز أمني بنجاح ✅' : 'رسوب في الاختبار ❌';
            statusDiv.style.color = isPassed ? 'var(--success)' : 'var(--danger)';
            
            document.getElementById('result-details').innerHTML = `
                اسم المتدرب المقيد: <b>${currentTrainee.rank} / ${currentTrainee.name}</b><br>
                معرف الديسكورد: <b>${currentTrainee.discord}</b><br>
                الدرجة الفنية المحققة: ${score} من أصل ${selectedQuestions.length} أسئلة صحيحة
            `;

            const webAppUrl = "https://script.google.com/macros/s/AKfycbzyImNuPcy9wUTkx3XuKtw-jH4tjrokhIWcQD4aYqrXBSoRR-WIqgqtsyixmE03jFFktw/exec"; 
            
            const payload = {
                name: currentTrainee.name, rank: currentTrainee.rank, discord: currentTrainee.discord,
                courseName: currentTrainee.courseName, score: score, total: selectedQuestions.length,
                percentage: percentage, status: isPassed ? "اجتياز" : "رسوب"
            };

            fetch(webAppUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            }).then(() => console.log("تم الترحيل بنجاح")).catch(e => console.error(e));
            
            window.scrollTo(0, 0);
        }
    </script>
