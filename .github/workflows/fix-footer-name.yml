name: Fix footer owner name

on:
  push:
    branches:
      - feature/public-security

permissions:
  contents: write

jobs:
  fix-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct footer name
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = 'مجاهد آل عياد'
          new = 'مجاهد ال عباد'
          if old not in text:
              raise SystemExit('Old footer name was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/fix-footer-name.yml
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/fix-footer-name.yml
          git commit -m "تصحيح الاسم في تذييل الموقع"
          git push
